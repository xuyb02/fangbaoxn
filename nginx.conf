server {
    listen 80;
    server_name xyb-resume.xyz www.xyb-resume.xyz;
    root /var/www/material-analysis;
    index index.html;

    # 启用Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # 缓存策略
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html)$ {
        expires 10m;
        add_header Cache-Control "public";
    }

    # SPA路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # 日志配置
    access_log /var/log/nginx/material-analysis.access.log;
    error_log /var/log/nginx/material-analysis.error.log;
}

server {
    listen 443 ssl http2;
    server_name xyb-resume.xyz www.xyb-resume.xyz;
    root /var/www/material-analysis;
    index index.html;

    ssl_certificate /etc/nginx/ssl/xyb-resume.xyz.crt;
    ssl_certificate_key /etc/nginx/ssl/xyb-resume.xyz.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html)$ {
        expires 10m;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    access_log /var/log/nginx/material-analysis.ssl.access.log;
    error_log /var/log/nginx/material-analysis.ssl.error.log;
}